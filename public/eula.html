<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>End User Licence Agreement · Wellbeing Matters @ Work</title>
    <link rel="canonical" href="https://www.the-good-foundry.com/eula">
<meta name="description" content="End User Licence Agreement for Wellbeing Matters @ Work.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%23e8621a'/%3E%3C/svg%3E">
<style>
  :root {
    --orange: #e8621a;
    --orange-dark: #c84c10;
    --orange-pale: #fff4ee;
    --navy: #14202e;
    --text-dark: #1c2b3a;
    --text-mid: #45586a;
    --text-muted: #8097ad;
    --surface: #ffffff;
    --surface-2: #f4f7f9;
    --border: #e2e8ef;
    --body-bg: #f0f3f6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--body-bg);
    color: var(--text-dark);
    -webkit-font-smoothing: antialiased;
    line-height: 1.65;
  }
  header.page-hd {
    background: var(--navy);
    border-bottom: 4px solid var(--orange);
    padding: 20px 28px;
    color: #fff;
  }
  header.page-hd .hd-inner {
    max-width: 880px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header.page-hd .sub {
    color: var(--orange);
    font-size: 12px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  header.page-hd h1 { margin: 0; font-size: 22px; font-weight: 600; }
  main.wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: 28px 28px 80px;
  }
  .doc {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 30px 36px;
    box-shadow: 0 2px 12px rgba(20,32,46,0.04);
  }
  .doc h1 { color: var(--navy); font-size: 24px; margin: 0 0 18px; padding-bottom: 14px; border-bottom: 2px solid var(--orange); }
  .doc h2 { color: var(--navy); font-size: 18px; margin: 28px 0 10px; padding-top: 6px; }
  .doc h3 { color: var(--text-dark); font-size: 15px; margin: 18px 0 8px; font-weight: 600; }
  .doc p { margin: 10px 0; color: var(--text-mid); }
  .doc strong { color: var(--text-dark); }
  .doc ul, .doc ol { padding-left: 22px; color: var(--text-mid); margin: 8px 0; }
  .doc li { margin: 4px 0; }
  .doc li::marker { color: var(--orange); }
  .doc a { color: var(--orange-dark); }
  .doc code {
    background: var(--surface-2);
    padding: 1px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px;
    color: var(--navy);
  }
  .doc blockquote {
    border-left: 4px solid var(--orange);
    background: var(--orange-pale);
    margin: 14px 0;
    padding: 12px 18px;
    border-radius: 0 8px 8px 0;
    color: var(--text-dark);
  }
  .doc blockquote p { margin: 4px 0; color: var(--text-mid); }
  .doc table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 13px;
  }
  .doc th, .doc td {
    border: 1px solid var(--border);
    padding: 8px 10px;
    text-align: left;
    vertical-align: top;
  }
  .doc th { background: var(--surface-2); color: var(--text-dark); font-weight: 600; }
  .doc td { color: var(--text-mid); }
  .doc hr { border: 0; border-top: 1px solid var(--border); margin: 28px 0; }
  .meta {
    background: var(--orange-pale);
    border: 1px solid var(--orange);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text-dark);
    margin-bottom: 18px;
    line-height: 1.55;
  }
  .meta strong { color: var(--orange-dark); }
  .err {
    background: rgba(220,38,38,0.08);
    border: 1px solid rgba(220,38,38,0.25);
    border-radius: 8px;
    padding: 18px;
    color: #b91c1c;
    font-size: 13px;
    line-height: 1.6;
  }
  .err code { background: rgba(220,38,38,0.05); border-color: rgba(220,38,38,0.2); color: #b91c1c; }
  footer.page-ft {
    max-width: 880px;
    margin: 0 auto;
    padding: 18px 28px 48px;
    color: var(--text-muted);
    font-size: 11px;
    border-top: 1px solid var(--border);
    text-align: center;
  }
  @media print {
    header.page-hd, footer.page-ft, .meta { display: none; }
    body { background: #fff; }
    .doc { border: 0; box-shadow: none; padding: 0; }
  }
  /* Mobile pass (2026-06-04) — legal docs are often opened on phone
     from a contract email. The 28px+36px outer/inner padding combo
     left a narrow text column on iPhone width. */
  @media (max-width: 720px) {
    header.page-hd { padding: 16px 18px; }
    header.page-hd h1 { font-size: 18px; }
    main.wrap { padding: 18px 14px 56px; }
    .doc { padding: 22px 18px; }
    .doc h1 { font-size: 21px; }
    .doc h2 { font-size: 16px; }
    .doc h3 { font-size: 14.5px; }
  }
</style>
</head>
<body>

<header class="page-hd">
  <div class="hd-inner">
    <div>
      <div class="sub">Legal Document</div>
      <h1 id="page-title">End User Licence Agreement</h1>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="meta" id="meta-banner">
    <strong>Loading…</strong> Resolving edition-specific terms.
  </div>
  <article class="doc" id="doc">
    <p style="color:var(--text-muted);font-style:italic">Loading EULA…</p>
  </article>
</main>

<footer class="page-ft">
  Wellbeing Matters @ Work · End User Licence Agreement viewer · printable
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script>
(function () {
  /* ──────────────────────────────────────────────────────────
     EULA viewer — token substitution + conditional blocks.
     URL params:
       ?surface=vault|bank     (default: vault)
       ?edition=WPA|WPK|...    (default: WPA)
     ────────────────────────────────────────────────────────── */
  var qs = new URLSearchParams(window.location.search);
  var surface = (qs.get('surface') || 'vault').toLowerCase();
  var edition = (qs.get('edition') || 'WPA').toUpperCase();
  if (surface !== 'vault' && surface !== 'bank') surface = 'vault';

  var EDITIONS = {
    WPA: { label: 'Workplace · Wellbeing Matters @ Work',     audience: 'adult workplace respondent',           assessment: 'wellbeing self-assessment (PERMA Plus)' },
    WPK: { label: 'Workplace · Kids',                          audience: 'school-age child respondent',          assessment: 'wellbeing self-assessment (PERMAH, kids-pitched)' },
    WPY: { label: 'Workplace · Youth (Students)',              audience: 'high-school student respondent',       assessment: 'wellbeing self-assessment (PERMAH, student-pitched)' },
    WPL: { label: 'Workplace · Life',                          audience: 'adult life respondent',                 assessment: 'wellbeing self-assessment (PERMA Plus, life-context)' },
    WPU: { label: 'Workplace · University',                    audience: 'university student respondent',         assessment: 'wellbeing self-assessment (PERMA Plus, university-context)' },
    WPV: { label: 'Workplace · Veterinary',                    audience: 'veterinary professional respondent',    assessment: 'wellbeing self-assessment (PERMA Plus, veterinary-context)' },
    WPS: { label: 'Workplace · Sporting Organisations',        audience: 'sporting organisation respondent',      assessment: 'wellbeing self-assessment (PERMA Plus, sport-context)' },
    WPD: { label: 'Workplace · Bespoke Psychosocial Safety',   audience: 'adult workplace respondent',             assessment: 'psychosocial safety self-assessment' },
    WHC: { label: 'Workplace · Heart Of Change',               audience: 'Heart Of Change participant',           assessment: 'Heart Of Change self-assessment' },
    TGF: { label: 'The Good Foundry',                          audience: 'platform respondent',                   assessment: 'wellbeing self-assessment' }
  };
  var meta = EDITIONS[edition] || EDITIONS.WPA;

  var CONSTANTS = {
    'PLATFORM_NAME':      'Wellbeing Matters @ Work',
    'OWNER_LEGAL':        'The Good Foundry Pty Ltd',
    'OWNER_JURISDICTION': 'Victoria, Australia'
  };

  /* Resolve conditional `{{IF EDITION=X|Y}} … {{ENDIF}}` blocks.
     Multiple alternatives separated by `|`; the block renders only
     when the current edition matches. Single regex pass; supports
     blocks spanning multiple paragraphs because of the [\s\S]
     character class. */
  function resolveConditionals(text, currentEd) {
    var rx = /\{\{IF\s+EDITION\s*=\s*([A-Z|]+)\s*\}\}([\s\S]*?)\{\{ENDIF\}\}/g;
    return text.replace(rx, function (_, list, body) {
      var alternatives = String(list).split('|').map(function (s) { return s.trim().toUpperCase(); });
      return (alternatives.indexOf(currentEd) !== -1) ? body : '';
    });
  }

  /* Direct token substitution — straight find/replace across the
     constant set + edition-derived fields. */
  function substituteTokens(text, ed) {
    var subs = Object.assign({}, CONSTANTS, {
      'EDITION_LABEL':  ed.label,
      'EDITION_CODE':   edition,
      'AUDIENCE':       ed.audience,
      'ASSESSMENT_TYPE':ed.assessment
    });
    return Object.keys(subs).reduce(function (acc, key) {
      var re = new RegExp('\\{\\{\\s*' + key + '\\s*\\}\\}', 'g');
      return acc.replace(re, subs[key]);
    }, text);
  }

  /* Template paths moved 2026-05-26 from ../docs/eula/ to https://smart-tools-foundry.com/WBM/app/legal/
     when /WBM/docs/ was locked down. /docs/ is now blocked at the
     deploy level (no longer uploaded) + .htaccess deny-all on any
     legacy server-side copy. Public-fetched templates live alongside
     this viewer under app/legal/ where they belong. */
  var templateFile = (surface === 'bank')
    ? 'legal/eula_bank_template.md'
    : 'legal/eula_vault_template.md';

  var title = (surface === 'bank')
    ? 'End User Licence Agreement — Administrator'
    : 'End User Licence Agreement — Vault User';
  document.getElementById('page-title').textContent = title;
  document.title = title + ' · Wellbeing Matters @ Work';

  fetch(templateFile, { cache: 'no-store' })
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status + ' fetching ' + templateFile);
      return r.text();
    })
    .then(function (raw) {
      var withConditionals = resolveConditionals(raw, edition);
      var substituted      = substituteTokens(withConditionals, meta);

      /* Strip the "Rendering" footer section from the displayed
         document — it's documentation for whoever is wiring the
         viewer, not content for the end-user reading the EULA. */
      var renderingSplit = substituted.split(/\n## Rendering\b/);
      var bodyMd = renderingSplit[0];

      var html = marked.parse(bodyMd, { gfm: true, breaks: false });
      document.getElementById('doc').innerHTML = html;

      var meta2 = document.getElementById('meta-banner');
      meta2.innerHTML = '<strong>Edition:</strong> ' + meta.label + ' (' + edition + ') · '
                     + '<strong>Surface:</strong> ' + (surface === 'bank' ? 'Bank User (Administrator)' : 'Vault User (Respondent)')
                     + ' · <a href="javascript:window.print()" style="color:var(--orange-dark)">Print this page</a>';
    })
    .catch(function (err) {
      document.getElementById('meta-banner').style.display = 'none';
      document.getElementById('doc').innerHTML = '<div class="err">'
        + '<strong>Could not load EULA.</strong><br>'
        + 'The template file at <code>' + ('https://smart-tools-foundry.com/WBM/app/' + templateFile) + '</code> could not be retrieved. '
        + 'This may be because the document is still in draft and has not been deployed. '
        + 'Contact <a href="mailto:privacy@the-good-foundry.com">privacy@the-good-foundry.com</a> for the current version. '
        + '<br><br>Technical detail: ' + (err && err.message ? err.message : String(err))
        + '</div>';
    });
})();
</script>

</body>
</html>
