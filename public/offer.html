<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wellbeing Matters · Your Offer</title>
    <link rel="canonical" href="https://www.the-good-foundry.com/offer">
    <meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  /* Public proposal viewer — themed to match the public marketing
     pages (app/the-good-foundry-index.html). Deep blue + grape→punch
     accents on Outfit + DM Serif Display. The page is what prospects
     see in their inbox, so it has to read as a continuation of the
     marketing site, not the orange admin chrome. */
  :root {
    --twilight:#293890; --arctic:#1B75BC; --aqua:#26AAE1;
    --grape:#662C90;   --orchid:#91268F;  --punch:#EC008B;
    --bg:#F4F6FB; --card:#FFFFFF; --mid:#EEF1F8;
    --border:rgba(41,56,144,.12); --border-light:rgba(41,56,144,.08);
    --text:#161A2E; --text-dim:rgba(22,26,46,.58);
    --font:'Outfit',sans-serif;
    --serif:'DM Serif Display',serif;
    /* Legacy aliases so the existing class names keep resolving. */
    --text-dark:var(--text); --text-mid:#475066; --text-muted:var(--text-dim);
    --surface:var(--card); --surface-2:var(--mid);
    --green:#166534;
    --mono:'DM Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  html { scroll-behavior:smooth; }
  body {
    font-family:var(--font); color:var(--text); background:var(--bg);
    line-height:1.65; font-size:15px; overflow-x:hidden;
  }
  body::before {
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(ellipse 60% 50% at 80% 10%, rgba(102,44,144,.09) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 10% 80%, rgba(41,56,144,.11) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(27,117,188,.05) 0%, transparent 60%);
  }
  body > * { position:relative; z-index:1; }
  .wrap { max-width:880px; margin:0 auto; padding:32px 24px 80px; }
  .hero {
    background:linear-gradient(135deg,var(--twilight) 0%,var(--grape) 65%,var(--punch) 130%);
    color:#fff; padding:42px 36px; border-radius:22px; margin-bottom:24px;
    box-shadow:0 20px 60px rgba(41,56,144,.22);
    position:relative; overflow:hidden;
  }
  .hero::before {
    content:''; position:absolute; right:-100px; top:-100px;
    width:320px; height:320px; border-radius:50%;
    border:1px solid rgba(255,255,255,.15); pointer-events:none;
  }
  .hero::after {
    content:''; position:absolute; right:-50px; top:-50px;
    width:200px; height:200px; border-radius:50%;
    border:1px solid rgba(255,255,255,.12); pointer-events:none;
  }
  .hero .tag { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.10em; color:rgba(255,255,255,.85); margin-bottom:10px; position:relative; }
  .hero h1 { font-family:var(--font); font-size:34px; font-weight:700; line-height:1.15; margin-bottom:8px; letter-spacing:-0.02em; position:relative; color:#fff; }
  .hero h1 em { font-family:var(--serif); font-style:italic; font-weight:400; color:#fff; }
  .hero .sub { font-size:14.5px; color:rgba(255,255,255,.85); position:relative; }
  /* Hero meta line — overrides the page-level .meta default which
     uses var(--text-dim) (dark grey on light bg). Inside the hero
     it sits on a deep gradient so meta + strong both flip to white
     for legibility. */
  .hero .meta { color:rgba(255,255,255,.78); position:relative; }
  .hero .meta strong { color:#fff; }
  /* TGF logo lockup at the top of the hero. Sits left of (or above)
     the tag line. White SVG variant on a translucent backdrop tile
     so it reads on any of the gradient stops. */
  .hero-brand {
    display:flex; align-items:center; gap:12px; margin-bottom:18px;
    position:relative;
  }
  /* 2x logo per Marty 2026-06-06 — 38px felt undersized against
     the wordmark + 26px hero h1 sibling. Bumped to 76px (radius
     + padding scaled proportionally) so the brand mark anchors
     the hero properly. */
  .hero-brand .hero-logo {
    width:76px; height:76px; flex-shrink:0; border-radius:14px;
    background:rgba(255,255,255,.10); padding:8px;
    display:flex; align-items:center; justify-content:center;
  }
  .hero-brand .hero-logo img {
    width:100%; height:100%; object-fit:contain; display:block;
  }
  .hero-brand .hero-wordmark {
    font-size:14px; font-weight:600; letter-spacing:-.01em; color:#fff;
  }
  .hero-brand .hero-wordmark .hero-sub {
    font-size:10px; font-weight:500; color:rgba(255,255,255,.65);
    text-transform:uppercase; letter-spacing:.10em; margin-top:2px;
    display:block;
  }
  .card { background:#fff; border:1px solid var(--border); border-radius:16px; padding:24px 26px; margin-bottom:18px; box-shadow:0 2px 18px rgba(41,56,144,.04); }
  .card-h { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--grape); margin-bottom:12px; }
  .item { display:flex; justify-content:space-between; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--border-light); }
  .item:last-child { border-bottom:none; }
  .item .name { font-size:14px; font-weight:600; color:var(--text); }
  .item .desc { font-size:11.5px; color:var(--text-dim); margin-top:3px; line-height:1.55; }
  .item .price { font-size:15px; font-weight:700; color:var(--text); white-space:nowrap; }
  .item .toggle-wrap { display:flex; align-items:center; gap:10px; }
  .item .toggle { width:42px; height:22px; background:var(--border); border-radius:99px; position:relative; cursor:pointer; transition:background .2s; flex-shrink:0; }
  .item .toggle::after { content:''; position:absolute; left:2px; top:2px; width:18px; height:18px; background:#fff; border-radius:50%; transition:left .2s; box-shadow:0 1px 3px rgba(41,56,144,.18); }
  .item.on .toggle { background:linear-gradient(135deg,var(--grape),var(--punch)); }
  .item.on .toggle::after { left:22px; }
  .totals { background:var(--mid); border-radius:16px; padding:24px 26px; margin-bottom:18px; }
  .totals-row { display:flex; justify-content:space-between; padding:7px 0; font-size:13.5px; color:var(--text-dim); }
  .totals-row.grand { border-top:1px solid var(--border); margin-top:10px; padding-top:16px; font-size:20px; font-weight:700; color:var(--text); }
  .totals-row.grand .v { background:linear-gradient(135deg,var(--grape),var(--punch));-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-fill-color:transparent; }
  .accept-card { background:linear-gradient(135deg,rgba(236,0,139,.05) 0%,#fff 80%); border:1px solid rgba(236,0,139,.18); border-radius:22px; padding:32px 36px; margin-bottom:18px; }
  .accept-card h2 { font-family:var(--font); font-size:22px; font-weight:700; color:var(--text); margin-bottom:8px; letter-spacing:-.01em; }
  .accept-card h2 em { font-family:var(--serif); font-style:italic; font-weight:400; color:var(--arctic); }
  .accept-card p { font-size:13.5px; color:var(--text-dim); margin-bottom:20px; line-height:1.65; }
  .accept-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .input { flex:1 1 240px; min-width:200px; padding:12px 16px; border:1px solid var(--border); border-radius:100px; font-size:14px; font-family:inherit; color:var(--text); background:#fff; transition:border-color .15s; }
  /* 2026-06-07 — Marty: "Fix the input fields on the Offer areas
     they aren't human usable". The base `.input` rule above is
     pill-shaped (border-radius 100px) which works for the single-
     line signature input but reads as broken on multi-line textareas
     and date pickers (text squeezes into the rounded ends, native
     date-picker calendar icon overlaps the right curve, placeholder
     wraps awkwardly). Per-control overrides below restore a normal
     rectangular shape + generous inner padding + a sensible
     min-height so the field reads as something you can actually
     type into. */
  textarea.input {
    border-radius: 12px;
    padding: 12px 14px;
    width: 100%;
    min-height: 110px;
    resize: vertical;
    line-height: 1.55;
    display: block;
    box-sizing: border-box;
    min-width: 0;       /* let the textarea shrink to fit narrow panels */
  }
  input[type="date"].input,
  input[type="datetime-local"].input,
  input[type="time"].input {
    border-radius: 10px;
    padding: 11px 14px;
    width: 100%;
    max-width: 260px;
    min-width: 0;
    box-sizing: border-box;
  }
  .input:focus { outline:none; border-color:var(--arctic); }
  .btn { padding:12px 24px; border-radius:100px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; border:1px solid transparent; line-height:1.2; letter-spacing:.01em; transition:opacity .2s, transform .12s, box-shadow .15s, border-color .15s; }
  .btn-primary { background:linear-gradient(135deg,var(--grape),var(--punch)); color:#fff; box-shadow:0 4px 14px rgba(236,0,139,.22); }
  .btn-primary:hover { opacity:.92; transform:translateY(-1px); box-shadow:0 6px 18px rgba(236,0,139,.28); }
  .btn-ghost { background:#fff; color:var(--text); border-color:var(--border); }
  .btn-ghost:hover { border-color:var(--text-dim); }
  .status-pill { display:inline-block; padding:5px 14px; border-radius:99px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; }
  .status-pill.sent { background:rgba(236,0,139,.10); color:var(--punch); }
  .status-pill.accepted { background:rgba(45,158,107,.15); color:var(--green); }
  .status-pill.declined { background:rgba(220,38,38,.10); color:#b91c1c; }
  .status-pill.expired { background:rgba(148,163,184,.15); color:#64748b; }
  .flash { padding:12px 16px; border-radius:12px; margin-bottom:14px; font-size:13px; font-weight:500; }
  .flash.ok { background:rgba(45,158,107,.10); color:var(--green); border:1px solid rgba(45,158,107,.25); }
  .flash.err { background:rgba(220,38,38,.08); color:#b91c1c; border:1px solid rgba(220,38,38,.25); }
  .cover { font-size:14.5px; color:var(--text-dim); line-height:1.75; white-space:pre-line; }
  .meta { display:flex; flex-wrap:wrap; gap:18px; font-size:12px; color:var(--text-dim); margin-top:8px; }
  .meta strong { color:var(--text); font-weight:600; }

  /* ── Brochure-shape sections ────────────────────────────────────
     The proposal viewer now opens with narrative — a "Why this
     matters" framing block, per-edition "What you'll measure" panels
     drawn from proposal_pricing.json's summary + highlights, and a
     per-module "Modules & power-ups" section — before the pricing
     table appears. The sticky bottom-line pill at top-right
     short-circuits the narrative for clients who just want the
     number. */
  .brochure-section {
    background:#fff; border:1px solid var(--border); border-radius:16px;
    padding:28px 30px; margin-bottom:18px; box-shadow:0 2px 18px rgba(41,56,144,.04);
  }
  .brochure-section .b-eyebrow {
    font-size:11px; font-weight:600; color:var(--grape);
    text-transform:uppercase; letter-spacing:.10em; margin-bottom:10px;
  }
  .brochure-section h2 {
    font-size:22px; font-weight:700; color:var(--text); letter-spacing:-.02em;
    margin-bottom:10px; line-height:1.25;
  }
  .brochure-section h2 em { font-family:var(--serif); font-style:italic; font-weight:400; color:var(--arctic); }
  .brochure-section .b-lede {
    font-size:14.5px; color:var(--text-dim); line-height:1.7; margin-bottom:14px;
  }
  .b-item {
    padding:18px 0; border-bottom:1px solid var(--border-light);
  }
  .b-item:last-child { border-bottom:none; padding-bottom:4px; }
  .b-item .b-head {
    display:flex; justify-content:space-between; align-items:flex-start;
    gap:14px; margin-bottom:8px; flex-wrap:wrap;
  }
  .b-item .b-name {
    font-size:16px; font-weight:600; color:var(--text); line-height:1.35;
  }
  .b-item .b-name em { font-family:var(--serif); font-style:italic; font-weight:400; color:var(--arctic); }
  .b-item .b-tag {
    font-size:9px; font-weight:700; padding:3px 10px; border-radius:99px;
    text-transform:uppercase; letter-spacing:.08em; white-space:nowrap;
    background:rgba(102,44,144,.10); color:var(--grape);
  }
  .b-item .b-aud {
    font-size:11.5px; color:var(--text-dim); margin-top:2px;
  }
  .b-item .b-summary {
    font-size:14px; color:var(--text-dim); line-height:1.7; margin-top:8px;
  }
  .b-item .b-highlights {
    list-style:none; margin-top:12px; padding:0;
  }
  .b-item .b-highlights li {
    position:relative; padding-left:24px; margin:6px 0; font-size:13.5px;
    color:var(--text); line-height:1.6;
  }
  .b-item .b-highlights li::before {
    content:''; position:absolute; left:0; top:9px;
    width:10px; height:10px; border-radius:50%;
    background:linear-gradient(135deg,var(--grape),var(--punch));
  }

  /* Sticky "Show me the bottom line" pill — fades in after the user
     scrolls past the hero so the client can jump straight to the
     pricing card without scrolling through the narrative. */
  #bottom-line-pill {
    position:fixed; top:18px; right:18px; z-index:50;
    display:none; align-items:center; gap:6px;
    padding:10px 18px; border-radius:100px;
    background:linear-gradient(135deg,var(--grape),var(--punch));
    color:#fff; font-family:var(--font); font-weight:600; font-size:12.5px;
    text-decoration:none; box-shadow:0 6px 20px rgba(236,0,139,.35);
    letter-spacing:.01em; transition:opacity .2s, transform .2s;
  }
  #bottom-line-pill:hover { transform:translateY(-1px); opacity:.92; }
  #bottom-line-pill.visible { display:inline-flex; }
  #bottom-line-pill svg { width:14px; height:14px; }

  /* Download / Print button — sits next to the bottom-line pill in
     the top-right. Clicking it triggers window.print() with the
     print stylesheet below, which strips chrome (sticky pills,
     accept/decline buttons, scroll-watchers, toggle switches) so
     the prospect's browser produces a clean PDF via Save as PDF. */
  /* 2026-06-06 — Marty: "offer a print top right corner and at the
     end on these [proposal viewer URLs]". Pill is now visible from
     page load (was display:none until the scroll-watcher added
     .visible past 280px — that pattern made the Print affordance
     invisible to anyone reading the hero without scrolling). The
     bottom Print button is added separately below the trust block. */
  /* Themed to match the bottom Print button — brand gradient pill,
     white text + white SVG stroke. Sits top-right; smaller padding
     than the bottom pill since corner real-estate is tight.
     (Marty 2026-06-06.) */
  #download-pdf-pill {
    position:fixed; top:18px; right:18px; z-index:51;
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 18px; border-radius:99px;
    background:linear-gradient(135deg,#293890 0%,#662C90 65%,#EC008B 130%);
    color:#fff;
    border:0; cursor:pointer;
    font-family:var(--font); font-weight:700; font-size:12.5px;
    box-shadow:0 6px 18px rgba(102,44,144,.22);
    letter-spacing:.04em; transition:transform .12s, box-shadow .15s;
  }
  #download-pdf-pill:hover { transform:translateY(-1px); box-shadow:0 8px 22px rgba(102,44,144,.30); }
  #download-pdf-pill.visible { display:inline-flex; }
  #download-pdf-pill svg { stroke:#fff; }
  /* Bottom Print button — sits below the trust block as a clear
     end-of-document affordance. Visible from page load; hidden in
     print output. */
  /* Tighter top spacing — pulls the print pill closer to the
     gradient end-panel (was 36px; the prospect's eye was drifting
     past the CTA looking for what came next). Bottom stays 28px
     so it still has breathing room before the page end.
     (Marty 2026-06-06.) */
  .prop-print-bot-wrap { display:flex; justify-content:center; margin:14px 0 28px; }
  /* Print button themed to The Good Foundry brand gradient
     (navy → grape → punch) rather than the platform orange.
     Marty 2026-06-06: "Apply the-good-foundry.com theme which should
     not include orange buttons." */
  .prop-print-bot-btn {
    display:inline-flex; align-items:center; gap:8px;
    padding:13px 26px;
    background:linear-gradient(135deg,#293890 0%,#662C90 65%,#EC008B 130%);
    color:#fff;
    border:0; border-radius:99px; font-family:var(--font); font-size:13px;
    font-weight:700; letter-spacing:.04em; cursor:pointer;
    box-shadow:0 6px 18px rgba(102,44,144,.22);
    transition:transform .12s, box-shadow .15s;
  }
  .prop-print-bot-btn:hover { transform:translateY(-1px); box-shadow:0 8px 22px rgba(102,44,144,.30); }
  .prop-print-bot-btn svg { width:14px; height:14px; stroke:#fff; }
  @media print { .prop-print-bot-wrap { display:none !important; } }
  #download-pdf-pill svg { width:14px; height:14px; }
  /* When the bottom-line pill is showing, shift the download pill
     left so they don't overlap. Bottom-line is the orange CTA so
     it stays in the right slot; download sits next to it. */
  #bottom-line-pill.visible ~ #download-pdf-pill.visible,
  body:has(#bottom-line-pill.visible) #download-pdf-pill { right:230px; }

  /* ── Print stylesheet ────────────────────────────────────────
     Strips every interactive / sticky / chrome affordance so the
     prospect's "Save as PDF" produces a clean brochure-shape
     document. Keeps the hero, narrative sections, pricing table,
     and trust block. Hides the sticky pills, accept buttons, and
     decline toggles (a printed proposal is a snapshot, not an
     interactive surface). Drops gradient backgrounds for pure
     ink-friendly white + dark-on-light type on every page. */
  @media print {
    @page { margin: 18mm 14mm; size: A4; }
    body { background:#fff !important; overflow:visible !important; }
    body::before { display:none !important; }
    #bottom-line-pill, #download-pdf-pill { display:none !important; }
    .accept-card { display:none !important; }
    /* Toggle switches don't render meaningfully in print — replace
       with a flat tick / cross derived from .item.on / item:not(.on). */
    .item .toggle, .item .toggle-wrap > .toggle { display:none !important; }
    /* Page-break hints — keep edition/addon items together where
       possible; let the brochure sections split naturally between
       narrative blocks. */
    .hero { page-break-after:avoid; }
    .brochure-section, .card, .totals, .trust-card { page-break-inside:avoid; }
    .b-item { page-break-inside:avoid; }
    /* Print the hero gradient even when browsers respect "background
       printing off" — use !important + -webkit-print-color-adjust so
       the cover stays branded. */
    .hero, .trust-card {
      -webkit-print-color-adjust:exact !important;
      print-color-adjust:exact !important;
    }
    .wrap { padding:0; max-width:100%; }
  }

  /* Trust block at the bottom — founder + research + credibility
     mirror of the MMcQ proposal's "Why you can rely on us" page. */
  .trust-card {
    background:linear-gradient(135deg,#293890 0%,#662C90 65%,#EC008B 130%);
    color:#fff; padding:32px 36px; border-radius:22px;
    margin-bottom:18px; position:relative; overflow:hidden;
  }
  .trust-card::before {
    content:''; position:absolute; right:-80px; bottom:-80px;
    width:280px; height:280px; border-radius:50%;
    border:1px solid rgba(255,255,255,.12); pointer-events:none;
  }
  .trust-card h2 {
    font-size:22px; font-weight:700; line-height:1.25; letter-spacing:-.01em;
    margin-bottom:10px; position:relative;
  }
  .trust-card h2 em { font-family:var(--serif); font-style:italic; font-weight:400; }
  .trust-card p {
    font-size:14.5px; color:rgba(255,255,255,.88); line-height:1.75;
    margin-bottom:14px; position:relative; max-width:640px;
  }
  .trust-card p:last-child { margin-bottom:0; }

  /* Decline reason chips — multi-select pills above the free-text
     decline area. Unselected: ghost outline. Selected: filled punch
     pink to make the picked state legible without a tick icon. Hover
     and focus lift the chip so taps feel responsive on touch. */
  .decline-chip {
    appearance:none; -webkit-appearance:none;
    background:#fff;
    border:1.5px solid rgba(102,44,144,.22);
    color:var(--text-dark,#1c2b3a);
    padding:8px 14px; border-radius:99px;
    font-family:inherit; font-size:12.5px; font-weight:600;
    line-height:1.2; cursor:pointer;
    transition:background .15s, border-color .15s, color .15s, transform .15s, box-shadow .15s;
  }
  .decline-chip:hover { border-color:var(--punch,#EC008B); transform:translateY(-1px); box-shadow:0 3px 10px rgba(236,0,139,.10); }
  .decline-chip:focus-visible { outline:2px solid var(--punch,#EC008B); outline-offset:2px; }
  .decline-chip.selected {
    background:var(--punch,#EC008B); border-color:var(--punch,#EC008B); color:#fff;
    box-shadow:0 4px 14px rgba(236,0,139,.22);
  }
  .decline-chip.selected:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(236,0,139,.30); }
  .trust-card strong { font-weight:600; color:#fff; }

  /* ── Mobile pass (2026-06-04) ──────────────────────────────
     Public proposal viewer is shared via SMS / WhatsApp / email
     to clients who often open it on a phone first. The desktop
     layout was untouched for narrow viewports; this block addresses
     the highest-impact mobile issues: iOS zoom-on-focus from
     sub-16px form inputs, the 260px+1fr modal grid that crushed
     the right pane on iPhone width, sticky pills overlapping each
     other, and tap targets too small for thumbs. */
  @media (max-width: 720px) {
    .wrap { padding: 18px 14px 64px; }
    .hero h1 { font-size: 28px !important; line-height: 1.18; }
    .hero p  { font-size: 14.5px !important; }
    .brochure-section { padding: 22px 18px; border-radius: 14px; }
    .brochure-section h2 { font-size: 19px; }
    .accept-card { padding: 22px 18px; border-radius: 16px; }
    .accept-card h2 { font-size: 19px; }
    .trust-card { padding: 24px 20px; border-radius: 16px; }
    .trust-card h2 { font-size: 19px; }
    .trust-card p  { font-size: 13.5px; }
    /* Pricing item header stacks instead of squeezing name + price + toggle into one row */
    .item .b-head, .b-item .b-head { flex-direction: column; gap: 8px; }
    .item .b-name, .b-item .b-name { font-size: 15px; }

<style>
  /* Client carousel — visually matches the public index band

  /* Spacing math (Marty 2026-06-07: "EXACTLY the same please"):

       wrap.padding-bottom      = 80px (brochure breathing room)

  .prop-client-band { max-width:880px; margin:-80px auto 8px; padding:0 24px; position:relative; z-index:1; }
  .pcb-inner { background:linear-gradient(135deg,rgba(41,56,144,0.04) 0%,rgba(102,44,144,0.05) 100%); border:1px solid rgba(41,56,144,0.12); border-radius:18px; padding:20px 18px 22px; }
  .pcb-head { color:#293890; font-size:21px; font-weight:800; letter-spacing:.04em; text-transform:uppercase; text-align:center; margin-bottom:18px; }
  .pcb-carousel { display:flex; align-items:center; gap:10px; }
  .pcb-arrow { flex-shrink:0; width:36px; height:36px; border-radius:50%; border:1.5px solid rgba(41,56,144,0.18); background:#fff; color:#293890; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s, border-color .15s, color .15s, transform .12s; font-family:inherit; padding:0; }

  .pcb-logo-tile { flex:0 0 auto; height:84px; border-radius:12px; background:linear-gradient(135deg,#293890 0%,#1f2a6e 100%); border:1px solid rgba(41,56,144,0.35); display:flex; align-items:center; justify-content:center; padding:12px; box-sizing:border-box; transition:border-color .18s, box-shadow .18s, transform .12s; }
  .pcb-logo-tile img { max-width:100%; max-height:100%; object-fit:contain; display:block; filter:drop-shadow(0 1px 2px rgba(0,0,0,0.18)); }
  .pcb-logo-name { color:#fff; font-size:11px; font-weight:700; text-align:center; letter-spacing:.02em; line-height:1.2; }
  @media (max-width:600px) { .prop-client-band { padding:0 14px; margin:18px auto 6px; } .pcb-head { font-size:14px; margin-bottom:12px; } .pcb-logo-tile { height:68px; padding:10px; } }

</style>
<script>
(function () {
  /* Wire arrows + autoplay. Logo data loads once proposal context
     is known, since we need client_org to exclude the prospect's
     own logo from the strip. The main proposal script dispatches
     `wm:proposal-loaded` with the proposal payload — we listen
     for it. */
  var PCB_GAP = 14, PCB_AUTO_MS = 5000, PCB_SMOOTH_MS = 900;
  var paused = false, timer = null, rafTok = null;
  /* Per-page count mirrors the public index `.client-logo-band`
     thresholds — 2 at tiny phone, 4 at proposal-width laptop. The
     proposal page caps the wrap at 880px so the upper 5/6-per-page
     branches from the public index never fire here. */
  function _perPage() {
    var w = window.innerWidth;
    if (w < 600) return 2;
    return 4;
  }
  function _esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function _normName(s) { return String(s || '').trim().toLowerCase().replace(/\s+/g,' ').replace(/[^a-z0-9 ]+/g,''); }
  function _tileHtml(o) {
    var nm = _esc(o.name);
    var url = (typeof o.logo === 'string' && o.logo.trim() !== '') ? _esc(o.logo) : '';
    if (url) {
      return '<div class="pcb-logo-tile" title="' + nm + '"><img src="' + url + '" alt="' + nm + '" loading="lazy" onerror="this.parentNode.innerHTML=\'<span class=&quot;pcb-logo-name&quot;>' + nm + '</span>\'"></div>';
    }
    return '<div class="pcb-logo-tile" title="' + nm + '"><span class="pcb-logo-name">' + nm + '</span></div>';
  }
  function _fit() {
    var vp = document.getElementById('pcb-viewport');
    if (!vp) return;
    var tiles = vp.querySelectorAll('.pcb-logo-tile');
    if (!tiles.length) return;
    var perPage = _perPage();
    var vw = vp.clientWidth;
    if (vw <= 0) return;
    var tileW = Math.floor((vw - (perPage - 1) * PCB_GAP) / perPage);
    if (tileW < 70) tileW = 70;
    for (var i = 0; i < tiles.length; i++) tiles[i].style.width = tileW + 'px';
    var pageW = vw + PCB_GAP;
    vp.scrollLeft = Math.round(vp.scrollLeft / pageW) * pageW;
  }
  function _smoothScrollTo(vp, target, duration) {
    if (!vp) return;
    if (rafTok) { cancelAnimationFrame(rafTok); rafTok = null; }
    var start = vp.scrollLeft, delta = target - start;
    if (Math.abs(delta) < 1) { vp.scrollLeft = target; return; }
    var startTs = null;
    function _ease(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
    function _frame(ts) {
      if (startTs === null) startTs = ts;
      var p = Math.min(1, (ts - startTs) / duration);
      vp.scrollLeft = start + delta * _ease(p);
      if (p < 1) rafTok = requestAnimationFrame(_frame); else rafTok = null;
    }
    rafTok = requestAnimationFrame(_frame);
  }
  function _nudge(dir, wrap) {
    var vp = document.getElementById('pcb-viewport');
    if (!vp) return;
    var maxScroll = vp.scrollWidth - vp.clientWidth;
    if (maxScroll <= 1) return;
    var step = vp.clientWidth + PCB_GAP;
    var next = vp.scrollLeft + (dir * step);
    var wrapping = false;
    if (next > maxScroll - 2) { if (wrap) { next = 0; wrapping = true; } else next = maxScroll; }
    else if (next < 0)        { if (wrap) { next = Math.ceil(maxScroll / step) * step; wrapping = true; } else next = 0; }
    if (wrapping) { if (rafTok) { cancelAnimationFrame(rafTok); rafTok = null; } vp.scrollLeft = next; }
    else          { _smoothScrollTo(vp, next, PCB_SMOOTH_MS); }
  }
  function _render(logos) {
    var band = document.getElementById('prop-client-band');
    var track = document.getElementById('pcb-track');
    if (!band || !track) return;
    if (!logos || !logos.length) { band.style.display = 'none'; return; }
    track.innerHTML = logos.map(_tileHtml).join('');
    band.style.display = '';
    _fit();
    window.addEventListener('resize', _fit, { passive: true });
    if (timer) { clearInterval(timer); timer = null; }
    timer = setInterval(function () { if (!paused) _nudge(1, true); }, PCB_AUTO_MS);
  }
  function _wire() {
    var prev = document.getElementById('pcb-arrow-prev');
    var next = document.getElementById('pcb-arrow-next');
    var vp = document.getElementById('pcb-viewport');
    if (prev) prev.addEventListener('click', function () { _nudge(-1, true); });
    if (next) next.addEventListener('click', function () { _nudge(1, true); });
    if (vp) {
      vp.addEventListener('mouseenter', function () { paused = true; });
      vp.addEventListener('mouseleave', function () { paused = false; });
    }
  }
  function _load(clientOrgName) {
    _wire();
    var excludeKey = _normName(clientOrgName);
    fetch('https://smart-tools-foundry.com/WBM/api/public_client_logos.php', { cache: 'no-store' })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (j) {
        if (!j || !j.ok) { _render([]); return; }
        var logos = Array.isArray(j.logos) ? j.logos : [];
        /* Exclude the current proposal's client logo so the prospect
           never sees their own logo in the trust strip. Normalised
           name match — case-insensitive, whitespace-collapsed,
           punctuation-stripped. */
        if (excludeKey) {
          logos = logos.filter(function (o) { return _normName(o && o.name) !== excludeKey; });
        }
        _render(logos);
      })
      .catch(function () { _render([]); });
  }
  /* The proposal script fires `wm:proposal-loaded` after the
     proposal JSON arrives + the body is rendered. We listen for
     that event so we get the client_org before fetching logos.
     Fallback: if the event hasn't fired within 3s (e.g. the
     proposal failed to load), boot anyway with no exclusion. */
  var booted = false;
  function _boot(orgName) {
    if (booted) return; booted = true;
    _load(orgName || '');
  }
  document.addEventListener('wm:proposal-loaded', function (ev) {
    var det = (ev && ev.detail) || {};
    _boot(det.client_org || '');
  });
  setTimeout(function () { _boot(''); }, 3000);
})();
</script>

<script>
(function () {
  function $(id) { return document.getElementById(id); }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]); }); }
  function money(n, ccy) {
    var v = Number(n || 0);
    return (ccy || 'AUD') + ' ' + v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  /* 2026-06-19 — Currency switch for non-AUD clients.
     Marty: 'For clients with currency not AUD on their account (Zoho
     billing) the price amount stays same but is USD instead of AUD and
     then show the AUD based on the set amount which will be USD.'

     Logic:
       • AUD client → show prices as AUD (existing behaviour)
       • Non-AUD client → relabel the same numeric value as USD AND
         append a small "≈ AUD <equiv>" note alongside, using a static
         USD→AUD FX rate.

     The catalogue prices stay numeric — the relabel happens at the
     display layer only. No DB change to existing proposals.

     USD→AUD rate is a hard-coded constant here so a deploy is the
     authoritative source of truth. Bump on a quarterly review (or
     whenever Marty says); set as low as we want to honour for the
     "≈ AUD" courtesy figure on offers. As of 2026-06-19: 1 USD ≈ 1.52 AUD. */
  var USD_TO_AUD = 1.52;
  function _displayCurrency() {
    /* client_currency comes from organisations.default_currency via
       proposals.php (2026-06-19). Falls back to the rep-selected
       proposal.currency, then 'AUD'. */
    var cc = '';
    try { cc = String((proposal && proposal.client_currency) || '').toUpperCase().trim(); } catch (_e) {}
    if (!cc) {
      try { cc = String((proposal && proposal.currency) || '').toUpperCase().trim(); } catch (_e) {}
    }
    if (!cc) return 'AUD';
    /* Any non-AUD client routes to USD per spec — Zoho can carry NZD /
       GBP / EUR / etc but we standardise the offer display on USD. */
    return cc === 'AUD' ? 'AUD' : 'USD';
  }
  function _isNonAudClient() { return _displayCurrency() !== 'AUD'; }
  /* moneyWithEquiv — client-facing surface (offer viewer). Direction:
     - USD client → primary in USD only. No AUD courtesy line. (Marty
       2026-06-19: "USD. No need to show AUD.")
     - AUD client → primary in AUD + a small "≈ USD …" courtesy line
       so the AU client can see what the US-equivalent price looks
       like. (Marty 2026-06-19: "But when AUD do show USD.")
     Static USD_TO_AUD constant — AUD-to-USD is the reciprocal. */
  function moneyWithEquiv(n) {
    var ccy = _displayCurrency();
    var v   = Number(n || 0);
    var primary = money(v, ccy);
    if (ccy === 'USD') return primary; /* USD client → no equivalent line */
    /* AUD client → tack on the USD courtesy line. */
    var usdEq = +(v / USD_TO_AUD).toFixed(2);
    return primary
         + '<span class="fx-note" style="display:block;font-size:10.5px;font-weight:500;color:var(--text-muted,#8097ad);margin-top:2px;letter-spacing:0">≈ ' + money(usdEq, 'USD') + '</span>';
  }
  /* Decline key for an edition line — includes plan_code so two
     plans of the same edition (e.g. WPL 1-month + WPL 12-month)
     can be toggled independently. Legacy lines with no plan fall
     back to "ed:<key>" so existing data renders unchanged. */
  function _edDeclineKey(e) {
    var k = String(e && e.key ? e.key : '');
    var p = String(e && e.plan_code ? e.plan_code : '');
    return p ? ('ed:' + k + '|' + p) : ('ed:' + k);
  }

  function recalcTotals() {
    var subtotal = 0;
    (proposal.items.editions || []).forEach(function (e) {
      if (declined[_edDeclineKey(e)]) return;
      var qty = Math.max(1, Number(e.qty || 1));
      subtotal += Number(e.amount || 0) * qty;
    });
    (proposal.items.addons || []).forEach(function (a, _ix) {
      /* data-key now includes the row index so flex-addon rows
         (Technical & Software Services can repeat with the same `id`)
         get distinct toggles. The key shape is `ad:<id>:<idx>`. */
      if (declined['ad:' + a.id + ':' + _ix]) return;
      var qty = Math.max(1, Number(a.qty || 1));
      subtotal += Number(a.price || 0) * qty;
    });
    /* Per-seat charging is OFF — flat plan pricing only. The
       proposal row may still carry a non-zero discount_pct from
       legacy proposals; honour it on read so historical proposals
       render the same way they were sent. */
    var seatCharge = 0;
    var discountPct = Number(proposal.discount_pct || 0);
    var discount = +(subtotal * discountPct / 100).toFixed(2);
    /* Coupon — match the wizard's math so the prospect's view agrees
       with the admin's review screen. Coupons stack on top of the
       volume bracket. */
    var coupon = proposal.items && proposal.items.coupon ? proposal.items.coupon : null;
    var couponDiscount = 0;
    if (coupon) {
      var afterVolume = subtotal - discount;
      if ((coupon.discount_type || 'percentage') === 'flat') {
        couponDiscount = Math.min(afterVolume, Number(coupon.discount_value || 0));
      } else {
        couponDiscount = +(afterVolume * Number(coupon.discount_value || 0) / 100).toFixed(2);
      }
    }
    var preTax = +(subtotal - discount - couponDiscount).toFixed(2);
    /* 2026-06-06 — Marty: "If the proposal is for a client which is
       in Australia the proposal should add in 10% and show clearly
       the tax IN ADDITION to the rates can you fix". GST detection:
         - explicit gst_applicable flag on the proposal (future
           field that bank super / rep portal can set per proposal),
         - OR the client country is AU,
         - OR the currency is AUD AND an Australian ABN is present
           on the proposal (presence of ABN is a strong "this is an
           AU registered business" tell).
       The AUD-only heuristic is intentional — a Canadian buyer
       paying in AUD isn't subject to GST. Tax sits on top of the
       discounted subtotal (post-coupon, post-volume), shown as its
       own line so the client sees exactly what's being added. */
    /* GST detection is STRICT country-only (Marty 2026-06-06, revised).
       GST applies only when the proposal's snapshotted client_country
       normalises to 'AU' (au / aus / australia) — the country is
       captured from the linked org at save time. The earlier
       AUD-currency default + ABN/gst_applicable cascade was removed so
       every surface (rep builder, sent cards, Bank Super list, send
       email, this viewer) decides GST from the one frozen signal and
       can't disagree. Consequence: a proposal whose org country isn't
       Australia (or a fresh prospect with no linked org) shows no GST.
       Legacy proposals saved before migration 130 carry no
       client_country → no GST line. */
    var isAU = false;
    try {
      isAU = /^(au|aus|australia)$/i.test(String(proposal.client_country || '').trim());
    } catch (_eGST) {}
    var taxRate = isAU ? 0.10 : 0;
    var tax = +(preTax * taxRate).toFixed(2);
    var total = +(preTax + tax).toFixed(2);
    return { subtotal: subtotal, discount: discount, discountPct: discountPct, coupon: coupon, couponDiscount: couponDiscount, preTax: preTax, tax: tax, taxRate: taxRate, isAU: isAU, total: total, seatCharge: seatCharge };
  }

  /* Counter / decline / ice panel toggles. Mutually exclusive —
     opening one closes the others so the action card stays compact
     and the prospect can't accidentally fill more than one. */
  function _propHidePanels() {

  /* 2026-06-07 — Marty: "the button stays grading/selection stays
     on Accept offer". The action row left Accept offer styled as
     btn-primary (filled gradient) even when the prospect had clicked
     a different path (Counter / Revise / Ice / Decline) — visually
     wrong because Accept is no longer the active intent. Helper
     below flips the .btn-primary / .btn-ghost classes so the active
     intent's button is the gradient one, and also clears the lingering
     :focus ring on the previously-active button (which the browser
     keeps glued there after a click). On panel-close everything snaps
     back to the default state with Accept as the primary. */
  function _propSetActiveAction(name) {
    var row = $('prop-action-row');
    if (!row) return;
    var btns = row.querySelectorAll('button[data-act]');
    Array.prototype.forEach.call(btns, function (b) {
      var match = (b.getAttribute('data-act') === name);
      if (match) {
        b.classList.remove('btn-ghost');
        b.classList.add('btn-primary');
      } else {
        b.classList.remove('btn-primary');
        b.classList.add('btn-ghost');
        /* Drop focus on the previously-primary button so its focus
           ring doesn't visually compete with the newly-active one. */
        if (document.activeElement === b) try { b.blur(); } catch (_e) {}
      }
    });
  }

      var d = $('ice-date');

  window._propCounter = function () {
    var t = $('counter-text');
    var b = $('counter-budget');
    var ccyEl = $('counter-budget-ccy');
    var terms = (t && t.value ? t.value : '').trim();
    var budgetRaw = (b && b.value ? b.value : '').trim();
    var budgetNum = budgetRaw === '' ? null : Number(budgetRaw);
    if (budgetNum !== null && (!isFinite(budgetNum) || budgetNum < 0)) {
      flash('Budget needs to be a positive number — or just leave it blank.', 'err');
      if (b) b.focus();
      return;
    }
    /* Either the budget OR the free-text counter terms must carry
       SOMETHING — without either field, the rep has nothing to act
       on. (Budget alone is fine; words alone are fine; both is great.) */
    if (!terms && budgetNum === null) {
      flash('Tell us your budget OR what you have in mind — anything we can work with.', 'err');
      if (b) b.focus();
      else if (t) t.focus();
      return;
    }
    /* Compose the message. Budget lands at the top so it's the first
       thing the rep sees in the notification email. The backend stores
       the whole string in `decline_reason` (reused as the prospect-message
       column) — no schema change required. */
    var ccy = ccyEl ? (ccyEl.textContent || 'AUD') : 'AUD';
    var composed = '';
    if (budgetNum !== null) {
      composed += 'Budget: ' + ccy + ' '
        + budgetNum.toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 })
        + '\n\n';
    }
    if (terms) composed += terms;
    composed = composed.trim();
    fetch('https://smart-tools-foundry.com/WBM/api/proposals.php?action=counter', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, counter_terms: composed })
    }).then(function (r) { return r.text().then(function (raw) {
      var j; try { j = JSON.parse(raw); } catch (e) { throw new Error('Invalid response'); }
      if (!j || !j.ok) throw new Error((j && j.error) || ('HTTP ' + r.status));
      return j;
    }); }).then(function () {
      flash('Sent — thanks for trusting us with the context. We\'ll come back with the best version we can stand behind.', 'ok');
      setTimeout(function () { window.location.reload(); }, 1800);
    }).catch(function (e) { flash('Could not send: ' + (e.message || e), 'err'); });
  };

  /* Toggle a decline-reason chip on/off. Multi-select: every chip
     is independent. The "Something else" chip carries a
     data-focus-text attribute so picking it auto-focuses the
     free-text box (and unpicking it doesn't blur — the user may
     still be typing). 2026-06-07. */
  window._propToggleDeclineReason = function (btn) {

            + avatarBlock
            + '<div>'
              + '<div style="font-size:15px;font-weight:800;color:var(--text-dark);font-family:DM Serif Display,Georgia,serif;font-style:italic;font-weight:400">' + esc(repName) + '</div>'
              + '<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px">' + esc(repTitle) + '</div>'
            + '</div>'
          + '</div>'
          + '<div style="font-size:12px;line-height:1.6;color:var(--text-mid);margin-top:14px;padding:12px;background:#fff;border:1px solid rgba(15,22,34,0.08);border-radius:10px;font-style:italic">' + esc(repTagline) + '</div>'
          + '<div style="margin-top:14px">' + contactRows + '</div>'
        + '</div>'
        /* Right pane — tabbed Message / Book a call */
        + '<div style="display:flex;flex-direction:column;min-height:0">'
          + '<div style="display:flex;gap:8px;padding:14px 22px 0;flex-shrink:0">'
            + '<button type="button" id="prop-talk-tab-msg"  onclick="window._propTalkTab(\'msg\')"  style="padding:8px 18px;border:1.5px solid var(--punch,#EC008B);background:var(--punch,#EC008B);color:#fff;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Send a message</button>'
            + '<button type="button" id="prop-talk-tab-book" onclick="window._propTalkTab(\'book\')" style="padding:8px 18px;border:1.5px solid rgba(15,22,34,0.18);background:#fff;color:var(--text-mid);border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Book a call</button>'
          + '</div>'
          /* Message form pane */
          + '<div id="prop-talk-pane-msg" style="flex:1;padding:18px 22px;overflow:auto;min-height:0">'
            + '<p style="margin:0 0 14px;font-size:13px;color:var(--text-mid);line-height:1.6">Drop a quick note and ' + esc(repName.split(/\s+/)[0] || 'your rep') + ' will be in touch. We\'ll keep ' + esc('marty@the-good-foundry.com') + ' in the loop too.</p>'
            + '<div id="prop-talk-flash"></div>'
            + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">'
              + '<div><label style="display:block;font-size:11px;font-weight:700;color:var(--text-dark);margin-bottom:4px">Your name</label><input type="text" id="prop-talk-name" class="input" placeholder="Your full name"/></div>'
              + '<div><label style="display:block;font-size:11px;font-weight:700;color:var(--text-dark);margin-bottom:4px">Reply email</label><input type="email" id="prop-talk-email" class="input" placeholder="you@example.com"/></div>'
            + '</div>'
            + '<label style="display:block;font-size:11px;font-weight:700;color:var(--text-dark);margin-bottom:4px">Your message</label>'
            /* Pill-shaped .input radius (100px) reads as ugly on a
               tall textarea — override inline to a sensible card
               radius for multi-line input. */
            + '<textarea id="prop-talk-msg" class="input" rows="6" placeholder="What\'s on your mind? Tell us what you\'d like to talk through and we\'ll be in touch." style="border-radius:14px;resize:vertical;font-family:inherit;line-height:1.5;width:100%"></textarea>'
            + '<div style="display:flex;justify-content:flex-end;margin-top:10px">'
              + '<button type="button" class="btn btn-primary" onclick="window._propTalkSend()">Send to ' + esc(repName.split(/\s+/)[0] || 'rep') + '</button>'
            + '</div>'
          + '</div>'
          /* Booking iframe pane */
          + '<div id="prop-talk-pane-book" style="display:none;flex:1;padding:0;min-height:0;background:#fff">'
            + '<iframe id="prop-talk-iframe" src="about:blank" title="Book a call" style="width:100%;height:100%;border:0" referrerpolicy="no-referrer-when-downgrade"></iframe>'
          + '</div>'
        + '</div>'
      + '</div>'
      + '</div>';
    return node;
  }
})();
</script>
