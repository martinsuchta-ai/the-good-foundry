<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power-Down Approval · Wellbeing Matters</title>
    <link rel="canonical" href="https://www.the-good-foundry.com/approve_power_down">
    <meta name="robots" content="noindex,nofollow">
<style>
  :root {
    --primary:#e8420a; --primary-dark:#b8330a; --primary-pale:#fff4ec;
    --navy:#0e1e40; --header-bg:#14202e; --navy-mid:#243a5e;
    --text-dark:#1c2b3a; --text-mid:#4a5f72; --text-muted:#8898b0;
    --border:#e2e8ef; --border-light:#eef2f7; --surface:#fff; --surface-2:#f8fafc;
    --green:#16a34a; --green-pale:#dcfce7; --red:#dc2626; --red-pale:#fef2f2;
    --amber:#d97706; --amber-pale:#fff8eb;
    --r:10px;
    --mono:ui-monospace,'SF Mono',Menlo,monospace;
  }
  *,*::before,*::after { box-sizing:border-box; }
  body {
    margin:0; padding:24px 16px; font-family:Arial,sans-serif; color:var(--text-dark);
    background:var(--surface-2); min-height:100vh;
    display:flex; align-items:flex-start; justify-content:center;
  }
  .wrap { max-width:680px; width:100%; }
  .card { background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 4px 24px rgba(20,32,46,.08); border:1px solid var(--border); margin-bottom:14px; }
  .hdr  { background:var(--header-bg); border-bottom:4px solid var(--primary); padding:28px 32px; color:#fff; }
  .hdr .tag { display:inline-block; font-size:10px; font-weight:800; color:var(--primary); text-transform:uppercase; letter-spacing:.1em; margin-bottom:6px; }
  .hdr h1   { margin:0; font-family:Georgia,serif; font-size:22px; font-weight:700; line-height:1.3; }
  .hdr .sub { font-size:13px; line-height:1.6; margin-top:8px; opacity:.85; }
  .body { padding:24px 32px; }
  .meta { background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r); padding:14px 18px; margin-bottom:16px; }
  .meta-row { display:flex; align-items:baseline; gap:8px; font-size:13px; padding:3px 0; }
  .meta-row strong { color:var(--text-dark); min-width:140px; display:inline-block; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); font-weight:800; }
  .meta-row span { color:var(--text-dark); flex:1; }
  .meta-row .pill { display:inline-block; padding:2px 10px; border-radius:99px; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; }
  .pill.p-pending  { background:var(--amber-pale); color:var(--amber); }
  .pill.p-approved { background:var(--green-pale); color:var(--green); }
  .pill.p-rejected { background:var(--red-pale);   color:var(--red); }
  .pill.p-more_info{ background:var(--primary-pale); color:var(--primary); }
  .pill.p-none     { background:#f1f5f9; color:#64748b; }

  .case-label { font-size:10px; font-weight:800; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
  .case-body  { font-size:13px; line-height:1.7; padding:14px 16px; background:var(--primary-pale); border:1px solid var(--primary); border-radius:var(--r); white-space:pre-wrap; margin-bottom:18px; }

  .items-list { padding:0; margin:0 0 16px; list-style:none; border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
  .items-list li { display:flex; justify-content:space-between; padding:8px 14px; font-size:12px; border-bottom:1px solid var(--border-light); }
  .items-list li:last-child { border-bottom:none; }
  .items-list .name { color:var(--text-dark); font-weight:600; }
  .items-list .price { color:var(--text-mid); font-family:var(--mono); font-size:11px; }

  .decide-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px; }
  .decide-btn {
    cursor:pointer; padding:14px 12px; border-radius:var(--r); border:1.5px solid var(--border);
    background:#fff; font-family:inherit; font-size:13px; font-weight:700; color:var(--text-mid);
    transition:background .12s, border-color .12s, color .12s;
  }
  .decide-btn:hover { border-color:var(--primary); }
  .decide-btn.active.approve   { background:var(--green); border-color:var(--green); color:#fff; }
  .decide-btn.active.more_info { background:var(--primary); border-color:var(--primary); color:#fff; }
  .decide-btn.active.reject    { background:var(--red); border-color:var(--red); color:#fff; }
  .comment-label { font-size:10px; font-weight:800; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
  .comment-input { width:100%; min-height:90px; padding:11px 13px; border:1.5px solid var(--border); border-radius:var(--r); font-family:inherit; font-size:13px; color:var(--text-dark); resize:vertical; }
  .comment-input:focus { outline:none; border-color:var(--primary); }
  .submit-btn { display:block; width:100%; padding:14px 16px; border-radius:var(--r); border:none; background:var(--primary); color:#fff; font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; margin-top:14px; }
  .submit-btn:hover:not(:disabled) { background:var(--primary-dark); }
  .submit-btn:disabled { opacity:.4; cursor:not-allowed; }

  .msg { padding:12px 14px; border-radius:var(--r); font-size:13px; line-height:1.5; margin-top:12px; }
  .msg.ok  { background:var(--green-pale); border:1px solid var(--green); color:#15803d; }
  .msg.err { background:var(--red-pale); border:1px solid #fecaca; color:#b91c1c; }

  .ftr { font-size:11px; color:var(--text-muted); text-align:center; padding:14px 16px; }

/* Mobile safety net (2026-07-12) — 16px form controls on small screens (no iOS focus-zoom) + media capped to container width. */
@media (max-width:480px){input,textarea,select{font-size:16px!important}}
img,video,iframe{max-width:100%}
/* Responsive layout (2026-07-12) — tighten the generous desktop padding on
   phones so the 3-up decide-row + content have room; no horizontal scroll. */
@media (max-width:560px){
  .hdr{padding:22px 20px}
  .hdr h1{font-size:19px}
  .body{padding:20px 18px}
  .meta-row strong{min-width:104px}
  .decide-btn{padding:12px 6px;font-size:12px}
}
</style>
</head>
<body>
<div class="wrap" id="root">
  <div class="card">
    <div class="hdr">
      <div class="tag">Power-Down approval</div>
      <h1 id="title">Loading…</h1>
      <div class="sub" id="subtitle">&nbsp;</div>
    </div>
    <div class="body" id="content">
      <div style="padding:24px;text-align:center;color:var(--text-muted);font-size:13px">Loading approval request…</div>
    </div>
  </div>
  <div class="ftr">The Good Foundry · Wellbeing Matters</div>
</div>

<script>
(function() {
  var qs       = new URLSearchParams(location.search);
  var token    = qs.get('token') || '';
  var preDecision = (qs.get('decision') || '').toLowerCase();
  var contentEl  = document.getElementById('content');
  var titleEl    = document.getElementById('title');
  var subEl      = document.getElementById('subtitle');
  var state      = { decision: '', token: token, busy: false, decided: false };

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function money(n, ccy) { var v = Number(n || 0); return (ccy || 'AUD') + ' ' + v.toLocaleString(undefined, { minimumFractionDigits:2, maximumFractionDigits:2 }); }

  if (!token) {
    titleEl.textContent = 'Missing token';
    subEl.textContent = '';
    contentEl.innerHTML = '<div class="msg err">No approval token in the URL. Please use the link from your email.</div>';
    return;
  }

  fetch('https://smart-tools-foundry.com/WBM/api/approve_power_down.php?action=context&token=' + encodeURIComponent(token))
    .then(function(r) { return r.json().then(function(j) { return { ok:r.ok, j:j }; }); })
    .then(function(x) {
      if (!x.ok || !x.j || !x.j.ok) {
        titleEl.textContent = 'Link no longer active';
        subEl.textContent = '';
        contentEl.innerHTML = '<div class="msg err">' + esc((x.j && x.j.error) || 'Unknown error') + '</div>';
        return;
      }
      render(x.j.proposal);
    })
    .catch(function(e) {
      titleEl.textContent = 'Network error';
      subEl.textContent = '';
      contentEl.innerHTML = '<div class="msg err">' + esc(e.message || 'network error') + '</div>';
    });

  function render(p) {
    var couponLine = (p.coupon && (p.coupon.name || p.coupon.code)) || '—';
    var discTxt = (p.coupon && p.coupon.discount_pct > 0)
      ? (Number(p.coupon.discount_pct).toFixed(1) + '% off')
      : ((p.coupon && p.coupon.discount_flat > 0)
          ? (money(p.coupon.discount_flat, p.currency) + ' off')
          : '—');
    var status = (p.request && p.request.status) || 'none';

    titleEl.textContent = (p.rep.name || 'A rep') + ' is requesting ' + couponLine;
    subEl.textContent   = 'For ' + (p.client_org || p.client_name || 'a client') + ' · Offer ' + p.id;

    /* Items summary */
    var itemsHtml = '';
    var items = p.items || {};
    if (items.editions && items.editions.length) {
      items.editions.forEach(function(e) {
        itemsHtml += '<li><span class="name">' + esc(e.label || e.key || '—') + ' <span style="color:var(--text-muted);font-weight:500">· ' + esc(e.key || '') + ' · ' + esc(p.term || '') + '</span></span><span class="price">' + esc(money(e.amount, p.currency)) + '</span></li>';
      });
    }
    if (items.addons && items.addons.length) {
      items.addons.forEach(function(a) {
        /* Flex addons (Technical & Software Services) — show the
           rep's description as the headline so the approver can
           tell distinct service lines apart, and append the
           per-effort math (qty × rate) when relevant. */
        var isFlex = a.pricing_mode === 'fixed' || a.pricing_mode === 'per_effort';
        if (isFlex) {
          var headline = (a.line_note && String(a.line_note).trim()) ? a.line_note : (a.label || a.id || '—');
          var modeSuffix = a.pricing_mode === 'per_effort'
            ? ' · ' + Number(a.effort_qty || 1) + ' × ' + esc(money(a.per_effort_rate || 0, p.currency))
            : ' · Fixed';
          itemsHtml += '<li><span class="name">' + esc(headline)
                    + ' <span style="color:var(--text-muted);font-weight:500">· ' + esc(a.label || a.id || '') + modeSuffix + '</span></span>'
                    + '<span class="price">' + esc(money(a.price, p.currency)) + '</span></li>';
        } else {
          itemsHtml += '<li><span class="name">' + esc(a.label || a.id || '—') + '</span><span class="price">' + esc(money(a.price, p.currency)) + '</span></li>';
        }
      });
    }
    if (!itemsHtml) itemsHtml = '<li style="color:var(--text-muted);font-style:italic">No line items recorded.</li>';

    contentEl.innerHTML = ''
      + '<div class="meta">'
      +   '<div class="meta-row"><strong>Status</strong><span><span class="pill p-' + esc(status) + '">' + esc(status) + '</span></span></div>'
      +   '<div class="meta-row"><strong>Client</strong><span>' + esc(p.client_org || p.client_name || '—') + '</span></div>'
      +   '<div class="meta-row"><strong>Subtotal</strong><span>' + esc(money(p.subtotal, p.currency)) + '</span></div>'
      +   '<div class="meta-row"><strong>Coupon</strong><span>' + esc(couponLine) + ' (' + esc(discTxt) + ')</span></div>'
      +   '<div class="meta-row"><strong>Rep</strong><span>' + esc(p.rep.name || '—') + (p.rep.email ? ' &lt;' + esc(p.rep.email) + '&gt;' : '') + '</span></div>'
      + '</div>'
      + '<div class="case-label">Line items</div>'
      + '<ul class="items-list">' + itemsHtml + '</ul>'
      + '<div class="case-label">Business case from rep</div>'
      + '<div class="case-body">' + esc(p.request.business_case || '(no case provided)') + '</div>'
      + '<div class="case-label">Decision</div>'
      + '<div class="decide-row">'
      +   '<button type="button" class="decide-btn" data-decision="approve">✓ Approve</button>'
      +   '<button type="button" class="decide-btn" data-decision="more_info">? More info</button>'
      +   '<button type="button" class="decide-btn" data-decision="reject">✗ Reject</button>'
      + '</div>'
      + '<div class="comment-label">Comment <span id="comment-req" style="color:var(--text-muted);font-weight:600">(required for reject / more info, optional for approve)</span></div>'
      + '<textarea class="comment-input" id="comment" maxlength="4000" placeholder="Add a note for the rep — will be emailed to them with your decision."></textarea>'
      + '<button class="submit-btn" id="submit" disabled>Submit decision</button>'
      + '<div id="msg"></div>';

    /* Hook up the decision buttons. */
    var btns = contentEl.querySelectorAll('.decide-btn');
    btns.forEach(function(b) {
      b.addEventListener('click', function() {
        if (state.decided) return;
        state.decision = b.dataset.decision;
        btns.forEach(function(x) {
          x.classList.toggle('active', x === b);
          x.classList.toggle('approve',   x.dataset.decision === 'approve');
          x.classList.toggle('more_info', x.dataset.decision === 'more_info');
          x.classList.toggle('reject',    x.dataset.decision === 'reject');
        });
        document.getElementById('submit').disabled = false;
      });
    });
    /* Pre-select decision based on which email button the approver clicked. */
    if (preDecision && /^(approve|reject|more_info)$/.test(preDecision)) {
      var preBtn = contentEl.querySelector('.decide-btn[data-decision="' + preDecision + '"]');
      if (preBtn) preBtn.click();
    }

    document.getElementById('submit').addEventListener('click', function() {
      if (state.busy) return;
      var comment = (document.getElementById('comment').value || '').trim();
      if (!state.decision) return;
      if (state.decision !== 'approve' && !comment) {
        showMsg('err', 'A comment is required when rejecting or asking for more info.');
        return;
      }
      state.busy = true;
      document.getElementById('submit').disabled = true;
      document.getElementById('submit').textContent = 'Submitting…';
      fetch('https://smart-tools-foundry.com/WBM/api/approve_power_down.php?action=decide', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ token: state.token, decision: state.decision, comment: comment })
      })
        .then(function(r) { return r.json().then(function(j) { return { ok:r.ok, j:j }; }); })
        .then(function(x) {
          state.busy = false;
          if (!x.ok || !x.j || !x.j.ok) {
            document.getElementById('submit').disabled = false;
            document.getElementById('submit').textContent = 'Submit decision';
            showMsg('err', (x.j && x.j.error) || 'Submission failed.');
            return;
          }
          state.decided = true;
          var label = { approved:'approved', rejected:'rejected', more_info:'asked the rep for more info' }[x.j.status] || x.j.status;
          showMsg('ok', 'Thanks — recorded. The rep has been ' + (x.j.rep_notified ? 'emailed about the outcome (' + label + ').' : 'left a note (' + label + ').'));
          /* Lock the form. */
          contentEl.querySelectorAll('.decide-btn').forEach(function(b) { b.disabled = true; });
          document.getElementById('comment').disabled = true;
          document.getElementById('submit').style.display = 'none';
        })
        .catch(function(e) {
          state.busy = false;
          document.getElementById('submit').disabled = false;
          document.getElementById('submit').textContent = 'Submit decision';
          showMsg('err', 'Submission failed: ' + esc(e.message || 'network error'));
        });
    });
  }

  function showMsg(kind, msg) {
    document.getElementById('msg').innerHTML = '<div class="msg ' + kind + '">' + esc(msg) + '</div>';
  }
})();
</script>
</body>
</html>
